<!DOCTYPE html>
<html lang="en">

    <title>Task Completion</title>
</head>
<body>
    <h1>Task Completion Logic</h1>
    <script>
        function completeTask(task) {
            if (task.isComplete) {
                awardCoins(task);
            } else {
                console.log('No coins awarded for incomplete tasks.');
            }
        }

        function awardCoins(task) {
            const coins = task.coins || 0;
            console.log(`Awarding ${coins} coins for task: ${task.name}`);
            // Logic to add coins to user's account goes here
        }
    </script>
</body>
</html>
